<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Place Value Visualizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Nunito',sans-serif;background:#faf9f6;color:#1e293b;height:100vh;height:100dvh;overflow:hidden;user-select:none;display:flex;flex-direction:column}
    #topBar{padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#fff;border-bottom:1px solid #e5e7eb;z-index:10}
    .btns{display:flex;gap:6px;flex-wrap:wrap}
    .ab{background:#fff;border:2px solid #e5e7eb;color:#1e293b;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer}
    .ab:hover{border-color:#6366f1;color:#6366f1}.ab.on{background:#6366f1;color:#fff;border-color:#6366f1}
    #numBar{flex-shrink:0;display:flex;align-items:center;position:relative;padding:10px 16px;min-height:86px;background:#fff;border-bottom:1px solid #f1f5f9}
    #vp{flex:1;position:relative;overflow:hidden;cursor:grab;touch-action:none}
    #vp:active{cursor:grabbing}
    canvas{position:absolute;top:0;left:0}
    #hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;color:#94a3b8;background:rgba(255,255,255,.9);padding:4px 16px;border-radius:8px;pointer-events:none;transition:opacity 2s}
    #hint.gone{opacity:0}
    .digit{cursor:pointer;border-radius:6px;padding:0 4px;transition:background .15s,color .15s}.digit:hover{background:#e2e8f0!important}
  </style>
</head>
<body>
<div id="topBar">
  <span style="font-size:13px;font-weight:900;color:#6366f1">Place Value Visualizer</span>
  <div class="btns">
    <button class="ab" id="lessonBtn">📖 Lesson</button>
    <button class="ab" id="decBtn">Decimals</button>
    <button class="ab" id="lblBtn">Labels</button>
    <button class="ab" id="zeroBtn">Show Zeros</button>
    <button class="ab" id="newBtn">New Number</button>
  </div>
</div>
<div id="numBar">
  <input type="text" id="numInput" placeholder="Type a number…" autocomplete="off" style="font-family:inherit;font-size:20px;font-weight:900;color:#1e293b;border:2px solid #e5e7eb;border-radius:10px;padding:8px 14px;width:190px;text-align:center;outline:none;background:#fff;position:relative;z-index:2" onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#e5e7eb'" />
  <span id="numDisplay" style="position:absolute;left:50%;transform:translateX(-50%);font-size:56px;font-weight:900;color:#1e293b;display:flex;align-items:baseline"></span>
</div>
<div id="vp"><canvas id="cv"></canvas><div id="hint">drag to pan · scroll to zoom · click a digit to highlight</div></div>
<script>
// ═══════════════════════════════════════════
// PLACES
// ═══════════════════════════════════════════
const CC=['#ef4444','#3b82f6','#22c55e','#f59e0b','#8b5cf6','#0d9488'];
const NAMES=['Millions','Hundred-Thousands','Ten-Thousands','Thousands','Hundreds','Tens','Ones','Tenths','Hundredths','Thousandths'];
const SHAPES=['cube','flat','stick','cube','flat','stick','cube','flat','stick','cube'];
const DEC=7,ONES=6,NP=10;
const P=NAMES.map((n,i)=>({name:n,color:CC[i%6],shape:SHAPES[i],exp:6-i}));

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const U=8,N=10,GAP=0.2,DEP=0.3,FLOOR_Y_OFFSET=120,ZOOM_MIN=0.01,ZOOM_MAX=100;
let digits=Array(NP).fill(0);
let showLabels=false,showZeros=false,showDecimals=false;
let panX=0,zoomLvl=1.0,enteredStr='';
let highlightedPlace=null,pulsePhase=0;

// ═══════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════
function cs(hex,a){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.min(255,Math.max(0,r+a))},${Math.min(255,Math.max(0,g+a))},${Math.min(255,Math.max(0,b+a))})`}
function bp(i,u){return i*u*(1+GAP)}
function stickLen(u){return bp(N-1,u)+u}
function fv(v){if(Math.abs(v)>=1)return String(Math.round(v)).replace(/\B(?=(\d{3})+(?!\d))/g,',');if(v===0)return'0';const d=Math.max(1,Math.round(-Math.log10(Math.abs(v))));return String(parseFloat((Math.round(v*Math.pow(10,d))/Math.pow(10,d)).toFixed(d+1)))}
function addCommas(s){const p=s.split('.');let wf='',w=(p[0]||'0').split('').reverse();for(let i=0;i<w.length;i++){if(i>0&&i%3===0)wf=','+wf;wf=w[i]+wf}return p[1]!==undefined?wf+'.'+p[1]:wf}
function unitForPlace(pi){const z=U*zoomLvl,sL=stickLen(z),e=P[pi].exp;if(e>=0&&e<=2)return z;if(e>=3&&e<=5)return sL;if(e===6)return stickLen(sL);if(e>=-3&&e<=-1)return z/(sL/z);return z}
function secDims(u,shape){const sL=stickLen(u),d=u*DEP,ds=d*0.6;if(shape==='cube')return{w:u+d,h:sL+d};if(shape==='stick')return{w:sL+d,h:sL+d};return{w:sL+ds*N+d,h:sL+ds*N+d}}
function getDEC_GAP(){return unitForPlace(ONES)*0.75}
function colW(pi){const u=unitForPlace(pi),dims=secDims(u,P[pi].shape);return dims.w+Math.max(P[pi].shape==='cube'?u*3:u*0.5,30)}
function worldX(pi){let x=0;if(pi<ONES){for(let i=ONES-1;i>=pi;i--){x-=colW(i);if(i===DEC)x-=getDEC_GAP()}}else if(pi>ONES){for(let i=ONES+1;i<=pi;i++){x+=colW(i-1);if(i===DEC)x+=getDEC_GAP()}}return x}

// ═══════════════════════════════════════════
// NUMBER MANAGEMENT
// ═══════════════════════════════════════════
function setNumber(n){const w=Math.floor(n),f=Math.round((n-w)*1000);digits[0]=Math.floor(w/1e6)%10;digits[1]=Math.floor(w/1e5)%10;digits[2]=Math.floor(w/1e4)%10;digits[3]=Math.floor(w/1e3)%10;digits[4]=Math.floor(w/100)%10;digits[5]=Math.floor(w/10)%10;digits[6]=w%10;digits[7]=Math.floor(f/100)%10;digits[8]=Math.floor(f/10)%10;digits[9]=f%10;enteredStr=String(n)}
function rand(){const styles=[()=>String(Math.floor(Math.random()*9+1)),()=>String(Math.floor(Math.random()*90+10)),()=>String(Math.floor(Math.random()*900+100)),()=>String(Math.floor(Math.random()*9000+1000)),()=>String(Math.floor(Math.random()*90000+10000)),()=>String(Math.floor(Math.random()*900000+100000)),()=>String(Math.floor(Math.random()*9000000+1000000)),()=>(Math.random()*9+1).toFixed(1),()=>(Math.random()*9+1).toFixed(2),()=>(Math.random()*900+100).toFixed(2),()=>(Math.random()*0.9+0.1).toFixed(1),()=>(Math.random()*0.09+0.01).toFixed(2),()=>(Math.random()*0.009+0.001).toFixed(3),()=>(Math.floor(Math.random()*9000+1000)+Math.random()).toFixed(2)];const s=styles[Math.floor(Math.random()*styles.length)]();highlightedPlace=null;setNumber(parseFloat(s));enteredStr=s}
window.toggleHighlight=function(pi){highlightedPlace=(highlightedPlace===pi)?null:pi;renderNum();render()};

// ═══════════════════════════════════════════
// DRAWING PRIMITIVES
// ═══════════════════════════════════════════
function iso(ctx,x,y,u,col){if(u<0.8)return;const d=u*DEP;ctx.fillStyle=col;ctx.fillRect(x,y,u,u);ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+d,y-d);ctx.lineTo(x+u+d,y-d);ctx.lineTo(x+u,y);ctx.closePath();ctx.fillStyle=cs(col,45);ctx.fill();ctx.beginPath();ctx.moveTo(x+u,y);ctx.lineTo(x+u+d,y-d);ctx.lineTo(x+u+d,y+u-d);ctx.lineTo(x+u,y+u);ctx.closePath();ctx.fillStyle=cs(col,-40);ctx.fill();if(u>3){ctx.strokeStyle=cs(col,-60);ctx.lineWidth=Math.max(.3,u*.012);ctx.strokeRect(x,y,u,u);ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+d,y-d);ctx.lineTo(x+u+d,y-d);ctx.lineTo(x+u,y);ctx.stroke();ctx.beginPath();ctx.moveTo(x+u,y);ctx.lineTo(x+u+d,y-d);ctx.lineTo(x+u+d,y+u-d);ctx.lineTo(x+u,y+u);ctx.stroke()}if(u>6){ctx.fillStyle='rgba(255,255,255,.18)';ctx.fillRect(x+.5,y+.5,u*.2,u*.2)}}

// Ghost containers
const GF='rgba(180,190,200,0.12)',GS='rgba(160,170,180,0.35)',GT='rgba(200,210,220,0.15)',GR='rgba(140,150,160,0.18)';
function ghostCubeCol(ctx,cx,cy,u){const sL=stickLen(u),d=u*DEP,lw=Math.max(.5,u*.025);ctx.fillStyle=GF;ctx.fillRect(cx,cy,u,sL);ctx.strokeStyle=GS;ctx.lineWidth=lw;ctx.strokeRect(cx,cy,u,sL);ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+d,cy-d);ctx.lineTo(cx+u+d,cy-d);ctx.lineTo(cx+u,cy);ctx.closePath();ctx.fillStyle=GT;ctx.fill();ctx.strokeStyle=GS;ctx.stroke();ctx.beginPath();ctx.moveTo(cx+u,cy);ctx.lineTo(cx+u+d,cy-d);ctx.lineTo(cx+u+d,cy+sL-d);ctx.lineTo(cx+u,cy+sL);ctx.closePath();ctx.fillStyle=GR;ctx.fill();ctx.strokeStyle=GS;ctx.stroke()}
function ghostStickGrid(ctx,cx,cy,u){const sL=stickLen(u),d=u*DEP,lw=Math.max(.5,u*.025);ctx.fillStyle=GF;ctx.fillRect(cx,cy,sL,sL);ctx.strokeStyle=GS;ctx.lineWidth=lw;ctx.strokeRect(cx,cy,sL,sL);ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+d,cy-d);ctx.lineTo(cx+sL+d,cy-d);ctx.lineTo(cx+sL,cy);ctx.closePath();ctx.fillStyle=GT;ctx.fill();ctx.strokeStyle=GS;ctx.stroke();ctx.beginPath();ctx.moveTo(cx+sL,cy);ctx.lineTo(cx+sL+d,cy-d);ctx.lineTo(cx+sL+d,cy+sL-d);ctx.lineTo(cx+sL,cy+sL);ctx.closePath();ctx.fillStyle=GR;ctx.fill();ctx.strokeStyle=GS;ctx.stroke()}
function ghostFlatCube(ctx,cx,cy,u){const sL=stickLen(u),d=u*DEP,ds=d*0.6,tdx=ds*N,tdy=ds*N,lw=Math.max(.5,u*.025);ctx.fillStyle=GF;ctx.fillRect(cx+tdx,cy-tdy,sL,sL);ctx.strokeStyle=GS;ctx.lineWidth=lw;ctx.strokeRect(cx+tdx,cy-tdy,sL,sL);ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+tdx,cy-tdy);ctx.lineTo(cx+sL+tdx,cy-tdy);ctx.lineTo(cx+sL,cy);ctx.closePath();ctx.fillStyle=GT;ctx.fill();ctx.strokeStyle=GS;ctx.stroke();ctx.beginPath();ctx.moveTo(cx+sL,cy);ctx.lineTo(cx+sL+tdx,cy-tdy);ctx.lineTo(cx+sL+tdx,cy+sL-tdy);ctx.lineTo(cx+sL,cy+sL);ctx.closePath();ctx.fillStyle=GR;ctx.fill();ctx.strokeStyle=GS;ctx.stroke();ctx.fillStyle=GF;ctx.fillRect(cx,cy,sL,sL);ctx.strokeStyle=GS;ctx.lineWidth=lw;ctx.strokeRect(cx,cy,sL,sL)}

// ═══════════════════════════════════════════
// DRAW PLACE
// ═══════════════════════════════════════════
function drawPlace(ctx,ox,oy,pi,cW,H,zoom){
  const p=P[pi],cnt=digits[pi],col=p.color,u=unitForPlace(pi);if(u<0.3)return;
  const step=u*(1+GAP),d=u*DEP,sL=stickLen(u),ds=d*0.6;
  const cx=ox,floor=oy+H-2,cy=floor-sL;
  const headerY=cy-ds*N-d-u*1.5,hsz=u*1.2;

  // Highlight column glow
  if(highlightedPlace===pi&&cnt>0){
    const a=0.08+0.04*Math.sin(pulsePhase);
    const dims2=secDims(u,p.shape);
    ctx.save();ctx.fillStyle=`rgba(148,163,184,${a})`;ctx.strokeStyle=`rgba(100,116,139,${a+0.15})`;
    ctx.lineWidth=Math.max(1,u*0.06);
    const hLeft=cx-u*0.3,hWidth=dims2.w+u*0.6;
    const hTop=headerY-hsz-u*0.8,hHeight=floor-hTop;
    ctx.fillRect(hLeft,hTop,hWidth,hHeight);ctx.strokeRect(hLeft,hTop,hWidth,hHeight);ctx.restore();
  }

  // Header
  if(hsz*zoom>3){ctx.font=`900 ${hsz}px Nunito`;ctx.fillStyle=col;ctx.textAlign='left';ctx.textBaseline='bottom';ctx.fillText(p.name,ox,headerY)}

  if(p.shape==='cube'){
    if(u>1)ghostCubeCol(ctx,cx,cy,u);
    for(let i=N-1;i>=0;i--){const y=cy+bp(i,u),slot=N-1-i;if(slot<cnt)iso(ctx,cx,y,u,col)}
    if(showLabels&&cnt>0&&u*zoom>2){const fsz=u*0.4;for(let i=0;i<N;i++){const y=cy+bp(i,u),slot=N-1-i;if(slot<cnt){ctx.font=`900 ${fsz}px Nunito`;ctx.fillStyle=col;ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(fv((slot+1)*Math.pow(10,p.exp)),cx+u+u*DEP+u*0.1,y+u/2)}}}
  }else if(p.shape==='stick'){
    if(u>1)ghostStickGrid(ctx,cx,cy,u);
    for(let c=0;c<N;c++){const x=cx+bp(c,u);if(c<cnt){for(let r=N-1;r>=0;r--)iso(ctx,x,cy+bp(r,u),u,col)}}
    if(showLabels&&cnt>0&&u*zoom>2){const fsz=u*0.8;for(let c=0;c<cnt;c++){ctx.save();ctx.translate(cx+bp(c,u)+u*0.5,floor+u*0.3);ctx.rotate(Math.PI/4);ctx.font=`700 ${fsz}px Nunito`;ctx.fillStyle=col;ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(fv((c+1)*Math.pow(10,p.exp)),0,0);ctx.restore()}}
  }else{
    const adjCy=floor-sL;
    if(u>1)ghostFlatCube(ctx,cx,adjCy,u);
    for(let fl=0;fl<N;fl++){const fx=cx+fl*step;if(fl<cnt){for(let la=N-1;la>=0;la--){const lx=fx+ds*la,ly=adjCy-ds*la;for(let r=N-1;r>=0;r--)iso(ctx,lx,ly+bp(r,u),u,col)}}}
    if(showLabels&&cnt>0&&u*zoom>2){const fsz=u*0.8;for(let fl=0;fl<cnt;fl++){ctx.save();ctx.translate(cx+fl*step+u*0.5,floor+u*0.3);ctx.rotate(Math.PI/4);ctx.font=`700 ${fsz}px Nunito`;ctx.fillStyle=col;ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(fv((fl+1)*Math.pow(10,p.exp)),0,0);ctx.restore()}}
  }
}

// ═══════════════════════════════════════════
// RENDER — single clean function
// ═══════════════════════════════════════════
function render(){
  const vpEl=document.getElementById('vp'),cv=document.getElementById('cv');
  const W=vpEl.clientWidth,H=vpEl.clientHeight,dpr=window.devicePixelRatio||1;
  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  const vcx=W/2,floorY=H-FLOOR_Y_OFFSET;

  // Floor
  ctx.strokeStyle='#cbd5e1';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,floorY);ctx.lineTo(W,floorY);ctx.stroke();
  const grad=ctx.createLinearGradient(0,floorY,0,floorY+30);grad.addColorStop(0,'rgba(0,0,0,0.04)');grad.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=grad;ctx.fillRect(0,floorY,W,30);

  // Draw places (respects decimal toggle inline)
  const end=showDecimals?NP:DEC;
  for(let i=0;i<end;i++){
    const wx=worldX(i),cw=colW(i),sx=wx*zoomLvl-panX+vcx,sw=cw*zoomLvl;
    if(sx+sw<-200||sx>W+200)continue;
    ctx.save();ctx.translate(sx,0);ctx.scale(zoomLvl,zoomLvl);
    drawPlace(ctx,0,0,i,cw,floorY/zoomLvl,zoomLvl);ctx.restore();
  }

  // Decimal point (only when decimals visible)
  if(showDecimals){
    const onesU=unitForPlace(ONES)*zoomLvl,onesX=worldX(ONES)*zoomLvl-panX+vcx;
    const onesW2=secDims(unitForPlace(ONES),P[ONES].shape).w*zoomLvl,dotR=onesU*0.35;
    const decX=onesX+onesW2+onesU*0.5+dotR*1.5;
    if(decX>-40&&decX<W+40){ctx.beginPath();ctx.arc(decX,floorY-dotR-1,dotR,0,Math.PI*2);ctx.fillStyle='#1e293b';ctx.fill()}
  }
}

// ═══════════════════════════════════════════
// NUMBER DISPLAY — single clean function
// ═══════════════════════════════════════════
function renderNum(){
  const disp=document.getElementById('numDisplay'),inp=document.getElementById('numInput');
  let rawStr;
  if(showZeros){
    const whole=String(parseInt(digits.slice(0,7).join(''))||0);
    rawStr=showDecimals?addCommas(whole+'.'+digits.slice(7).join('')):addCommas(whole);
  }else{
    rawStr=(!showDecimals&&enteredStr.includes('.'))?addCommas(enteredStr.split('.')[0]):addCommas(enteredStr);
  }
  if(document.activeElement!==inp)inp.value=rawStr;

  // Build clickable digit spans
  let html='';const parts=rawStr.split('.'),wholePart=parts[0],decPart=parts[1]||'';
  const wholeLen=wholePart.replace(/,/g,'').length;let ci=ONES-wholeLen+1;
  for(let i=0;i<wholePart.length;i++){
    const ch=wholePart[i];
    if(ch===','){html+='<span style="color:#94a3b8">,</span>';continue}
    const pi=ci++;
    if(pi>=0&&pi<=6){const hi=highlightedPlace===pi;html+=`<span class="digit" style="background:${hi?P[pi].color:'transparent'};color:${hi?'#fff':'inherit'}" onclick="toggleHighlight(${pi})">${ch}</span>`}
    else html+=`<span>${ch}</span>`;
  }
  if(decPart&&showDecimals){
    html+='<span style="color:#94a3b8">.</span>';let di=DEC;
    for(let i=0;i<decPart.length;i++){
      if(di<=9){const hi=highlightedPlace===di;html+=`<span class="digit" style="background:${hi?P[di].color:'transparent'};color:${hi?'#fff':'inherit'}" onclick="toggleHighlight(${di})">${decPart[i]}</span>`;di++}
      else html+=`<span>${decPart[i]}</span>`;
    }
  }
  disp.innerHTML=html;
}

// ═══════════════════════════════════════════
// INPUT HANDLERS
// ═══════════════════════════════════════════
const vpEl=document.getElementById('vp');
vpEl.addEventListener('wheel',e=>{e.preventDefault();const delta=-e.deltaY*0.002,oldZ=zoomLvl;zoomLvl=Math.max(ZOOM_MIN,Math.min(ZOOM_MAX,zoomLvl*(1+delta)));const rect=vpEl.getBoundingClientRect(),mx=e.clientX-rect.left,vcx=vpEl.clientWidth/2;panX=(mx-vcx+panX)/oldZ*zoomLvl-(mx-vcx);render();document.getElementById('hint').classList.add('gone')},{passive:false});

let drag=false,dsx=0,dsp=0;
vpEl.addEventListener('mousedown',e=>{drag=true;dsx=e.pageX;dsp=panX;document.getElementById('hint').classList.add('gone')});
window.addEventListener('mousemove',e=>{if(!drag)return;panX=dsp-(e.pageX-dsx);render()});
window.addEventListener('mouseup',()=>drag=false);

let tsx=0,tsp=0,lastPD=0,pinching=false;
function tDist(e){const dx=e.touches[0].pageX-e.touches[1].pageX,dy=e.touches[0].pageY-e.touches[1].pageY;return Math.sqrt(dx*dx+dy*dy)}
vpEl.addEventListener('touchstart',e=>{e.preventDefault();document.getElementById('hint').classList.add('gone');if(e.touches.length===2){pinching=true;lastPD=tDist(e)}else if(e.touches.length===1){pinching=false;tsx=e.touches[0].pageX;tsp=panX}},{passive:false});
vpEl.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===2&&pinching){const dist=tDist(e),mid=(e.touches[0].pageX+e.touches[1].pageX)/2,scale=dist/lastPD,oldZ=zoomLvl;zoomLvl=Math.max(ZOOM_MIN,Math.min(ZOOM_MAX,zoomLvl*scale));const rect=vpEl.getBoundingClientRect(),mx=mid-rect.left,vcx=vpEl.clientWidth/2;panX=(mx-vcx+panX)/oldZ*zoomLvl-(mx-vcx);lastPD=dist;render()}else if(e.touches.length===1&&!pinching){panX=tsp-(e.touches[0].pageX-tsx);render()}},{passive:false});
vpEl.addEventListener('touchend',e=>{if(e.touches.length<2)pinching=false;if(e.touches.length===1){tsx=e.touches[0].pageX;tsp=panX}});

// Buttons
document.getElementById('newBtn').addEventListener('click',()=>{rand();renderNum();render()});
document.getElementById('lblBtn').addEventListener('click',()=>{showLabels=!showLabels;document.getElementById('lblBtn').classList.toggle('on',showLabels);render()});
document.getElementById('zeroBtn').addEventListener('click',()=>{showZeros=!showZeros;document.getElementById('zeroBtn').classList.toggle('on',showZeros);renderNum()});
document.getElementById('decBtn').addEventListener('click',()=>{showDecimals=!showDecimals;document.getElementById('decBtn').classList.toggle('on',showDecimals);if(!showDecimals&&highlightedPlace!==null&&highlightedPlace>=DEC)highlightedPlace=null;renderNum();render()});
document.getElementById('numInput').addEventListener('keydown',e=>{if(e.key!=='Enter')return;const raw=e.target.value.replace(/,/g,'').trim();if(!raw)return;const n=parseFloat(raw);if(isNaN(n)||n<0||n>=1e7)return;highlightedPlace=null;setNumber(n);enteredStr=raw;e.target.blur();renderNum();render()});

// ═══════════════════════════════════════════
// LESSON OVERLAY
// ═══════════════════════════════════════════
function showLesson(){
  let ov=document.getElementById('lessonOverlay');if(ov){ov.remove();return}
  ov=document.createElement('div');ov.id='lessonOverlay';
  ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;padding:20px;';
  const box=document.createElement('div');
  box.style.cssText='background:#fff;border-radius:16px;max-width:600px;width:100%;max-height:85vh;overflow-y:auto;padding:28px 24px;font-family:Nunito,sans-serif;box-shadow:0 20px 60px rgba(0,0,0,0.3);';
  box.innerHTML=`<h1 style="font-size:22px;font-weight:900;color:#6366f1;margin-bottom:12px">🧱 Welcome to the Place Value Visualizer!</h1>
<h2 style="font-size:16px;font-weight:900;color:#1e293b;margin:16px 0 8px">What is Place Value?</h2>
<p style="font-size:14px;color:#374151;line-height:1.6;margin-bottom:12px">Every digit in a number has a <strong>value</strong> based on its <strong>position</strong>. The digit 3 means different things depending on where it sits:</p>
<ul style="font-size:14px;color:#374151;line-height:1.8;margin-left:20px;margin-bottom:12px">
<li>In <strong>300</strong>, the 3 means three <span style="color:#8b5cf6;font-weight:900">hundreds</span></li>
<li>In <strong>30</strong>, the 3 means three <span style="color:#0d9488;font-weight:900">tens</span></li>
<li>In <strong>3</strong>, the 3 means three <span style="color:#22c55e;font-weight:900">ones</span></li></ul>
<h2 style="font-size:16px;font-weight:900;color:#1e293b;margin:16px 0 8px">The Blocks</h2>
<p style="font-size:14px;color:#374151;line-height:1.6;margin-bottom:12px">This tool shows numbers using base-10 blocks — just like the ones in class!</p>
<ul style="font-size:14px;color:#374151;line-height:1.8;margin-left:20px;margin-bottom:12px">
<li>A small <strong>cube</strong> = 1 one</li><li>A <strong>stick</strong> (10 cubes) = 1 ten</li>
<li>A <strong>flat</strong> (10 sticks) = 1 hundred</li><li>A big <strong>cube</strong> (10 flats) = 1 thousand</li></ul>
<p style="font-size:14px;color:#374151;line-height:1.6;margin-bottom:12px">10 of anything always makes 1 of the next bigger thing!</p>
<h2 style="font-size:16px;font-weight:900;color:#1e293b;margin:16px 0 8px">How to Use</h2>
<ul style="font-size:14px;color:#374151;line-height:1.8;margin-left:20px;margin-bottom:12px">
<li><strong>Type a number</strong> and press Enter</li><li><strong>Click a digit</strong> to highlight its blocks</li>
<li><strong>Drag</strong> to see bigger or smaller places</li><li><strong>Scroll/pinch</strong> to zoom</li>
<li><strong>Labels</strong> shows the value of each block</li><li><strong>Decimals</strong> reveals tenths, hundredths, thousandths</li></ul>
<h2 style="font-size:16px;font-weight:900;color:#1e293b;margin:16px 0 8px">The Key Idea 💡</h2>
<p style="font-size:14px;color:#374151;line-height:1.6;margin-bottom:12px">The ghost outline shows what <strong>10 of those blocks</strong> would look like — that is exactly <strong>one block in the next place to the left</strong>. Fill up 10, regroup into the next place!</p>
<div style="text-align:center;margin-top:20px"><button onclick="document.getElementById('lessonOverlay').remove()" style="background:#6366f1;color:#fff;border:none;padding:12px 32px;border-radius:10px;font-size:16px;font-weight:900;font-family:Nunito;cursor:pointer">Got it — let me explore! 🚀</button></div>`;
  ov.appendChild(box);ov.addEventListener('click',e=>{if(e.target===ov)ov.remove()});document.body.appendChild(ov);
}
